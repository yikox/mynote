<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docsify Editor Integration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
  <style>
    #editor-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #editor {
      flex: 1;
      border-right: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="editor-container">
    <textarea id="editor"></textarea>
    <button id="save-button">Save</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/markdown/markdown.min.js"></script>
  <script>
    // 初始化 Docsify
    window.$docsify = {
      name: 'My Docs',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true
    };
    // 初始化 CodeMirror 编辑器
    var editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: 'markdown',
      lineNumbers: true,
      theme: 'default'
    });
    // 编辑器内容改变时，更新 Docsify 页面
    editor.on('change', function() {
      var content = editor.getValue();
      window.localStorage.setItem('markdownContent', content);
      window.location.reload(); // 刷新以便 Docsify 重新加载内容
    });
    // 保存按钮点击事件
    document.getElementById('save-button').addEventListener('click', function() {
      var content = editor.getValue();
      localStorage.setItem('markdownContent', content);
      alert('Content saved!');
    });
    // 加载保存的内容
    window.addEventListener('load', function() {
      var savedContent = window.localStorage.getItem('markdownContent');
      if (savedContent) {
        editor.setValue(savedContent);
        document.querySelector('#app').innerHTML = marked(savedContent);
      }
    });
  </script>
</body>
</html>
