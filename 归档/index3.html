<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown文档阅读器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">

</head>
<body>
  <!-- 顶部标题栏 -->
  <header>
    <div class="logo">Markdown阅读器</div>
    <!-- 顶部控制按钮区域 -->
    <div class="header-controls">
      <button class="header-btn" id="toggleFilesHeader">
        <span class="btn-text">◀ 文档列表</span>
      </button>
      <button class="header-btn" id="toggleTocHeader">
        <span class="btn-text">文章目录 ▶</span>
      </button>
    </div>
  </header>
  
  <!-- 主容器 - 包含所有主要内容区域 -->
  <div class="main-container">
    <!-- 左侧文件列表侧边栏 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">文档列表</span>
      </div>
      <!-- 文件列表容器 -->
      <div class="file-list" id="fileList">
        <!-- 文件列表将通过JavaScript动态生成 -->
      </div>
    </div>
    
    <!-- 中间内容区域 -->
    <div class="content-area">
      <div class="article-container">
        <!-- 文章内容容器 -->
        <div id="articleContent" class="article-content">
          <!-- 空状态提示 -->
          <div class="empty-state" id="emptyState">
            <div>📄📄</div>
            <h3>选择左侧文档开始阅读</h3>
            <p>从文档列表中选择一个Markdown文件查看内容</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 右侧目录侧边栏 -->
    <div class="toc-container">
      <div class="sidebar-header">
        <span class="sidebar-title">文章目录</span>
      </div>
      <!-- 目录内容容器 -->
      <div class="toc-content">
        <ul class="toc-list" id="tocList">
          <!-- 目录将通过JavaScript动态生成 -->
        </ul>
      </div>
    </div>
  </div>

  <!-- 外部库和脚本 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.1/markdown-it.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/5.0.0/anchor.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
